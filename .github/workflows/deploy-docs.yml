name: Deploy documentation site to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # macOS runner: Dokka aggregation resolves the modules' Apple/native (iOS)
    # klib dependencies, which fail to resolve on Linux. Matches publish.yml.
    runs-on: macos-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install MkDocs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build guides (MkDocs)
        run: mkdocs build --strict

      - name: Build API reference (Dokka)
        run: ./gradlew --no-daemon dokkaGenerateHtml

      - name: Build WASM demo
        run: ./gradlew --no-daemon --no-configuration-cache :table-sample:wasmJsBrowserDistribution

      - name: Assemble site (api + demo)
        run: |
          rm -rf site/api site/demo
          cp -r build/dokka/html site/api
          cp -r table-sample/build/dist/wasmJs/productionExecutable site/demo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
